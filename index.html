<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理学実験室へようこそ</title>
    <style>
        /* 背景色を薄いグレーに設定 */
        body {
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
        }

        /* 中央のテキストスタイル */
        h1 {
            font-size: 3rem;
            color: #333;
            margin-bottom: 2rem;
        }

        /* 青いボタンのスタイル */
        button {
            background-color: #007bff;
            color: white;
            font-size: 1.2rem;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* 赤い文字の表示領域 */
        #message {
            margin-top: 20px;
            font-size: 2rem;
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>心理学実験室へようこそ</h1>
    <button id="start-button">実験を開始する</button>
    <!-- メッセージ表示用エリア -->
    <div id="message"></div>

    <script>
        // ボタンにイベントリスナーを追加
        document.getElementById('start-button').addEventListener('click', function() {
            // ボタンを押すと画面内に赤い文字を表示
            const messageElement = document.getElementById('message');
            messageElement.textContent = 'Hello World!';
            
            // ボタンを非表示にする（オプション）
            document.getElementById('start-button').style.display = 'none';
        });
    </script>
</body>
</html>
