<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ストループ課題</title>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css">
    
    <style>
        body { background-color: #FFFFFF; font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; }
        .stimulus-text { font-size: 60px; font-weight: bold; }
        /* 中央揃え設定に変更 */
        .instruction-text { font-size: 24px; text-align: center; }
        .color-r { color: red; font-weight: bold; }
        .color-b { color: blue; font-weight: bold; }
        .color-g { color: green; font-weight: bold; }
        .bold-text { font-weight: bold; }
        .black-text { color: black; font-weight: normal; }
        /* 行間調整用スタイル */
        .instruction-row { margin-bottom: 20px; }
    </style>
</head>
<body>
    <script>
        const jsPsych = initJsPsych({
            on_finish: function() {
                const displayElement = jsPsych.getDisplayElement();
                displayElement.innerHTML = '<p>データを送信中です...</p>';

                const allData = jsPsych.data.get().filter({trial_type: 'html-keyboard-response'}).values();
                const processedData = allData.map(d => ({
                    subject_id: jsPsych.data.get().values()[0].subject_id || "unknown",
                    timestamp: d.time_elapsed,
                    word: d.target_text || "",
                    color: d.correct_color || "",
                    condition: d.condition || "",
                    rt: d.rt || null,
                    correct: d.correct ? "true" : "false"
                }));

                fetch('https://script.google.com/macros/s/AKfycbxSJ0WE4SInTfzOacjCo7hM4CvbAXL407FbtGD-yAdCqxjc3AlZBslct_CtJfs-tjBOKA/exec', {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(processedData)
                }).then(() => {
                    displayElement.innerHTML = '<p>実験終了。ご協力ありがとうございました。</p>';
                });
            }
        });

        const timeline = [];

        // 1. 参加者ID入力
        timeline.push({
            type: jsPsychSurveyText,
            questions: [{prompt: '参加者ID（学籍番号）を入力してください', name: 'subject_id', required: true}],
            on_finish: function(data) {
                jsPsych.data.addProperties({subject_id: data.response.subject_id});
            }
        });

        // 2. 全画面化の代替指示
        timeline.push({
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '<div class="instruction-text"><p>実験を開始します。<br>必要に応じてブラウザの全画面表示機能(F11キー等)を使用してください。<br><br>スペースキーで教示へ進みます。</p></div>',
            choices: [' ']
        });

        // 3. 教示画面
        timeline.push({
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <div class="instruction-text">
                    <p>文字の<span class="bold-text">『色』</span>を答えてください。</p>
                    <div class="instruction-row"><span class="color-r">赤</span><span class="black-text">色</span>なら 'R'</div>
                    <div class="instruction-row"><span class="color-b">青</span><span class="black-text">色</span>なら 'B'</div>
                    <div class="instruction-row"><span class="color-g">緑</span><span class="black-text">色</span>なら 'G'</div>
                    <p>スペースキーで開始。</p>
                </div>
            `,
            choices: [' ']
        });

        // 刺激定義
        const stimuli = [
            { text: "赤", color: "red", condition: "congruent" },
            { text: "青", color: "blue", condition: "congruent" },
            { text: "緑", color: "green", condition: "congruent" },
            { text: "赤", color: "blue", condition: "incongruent" },
            { text: "赤", color: "green", condition: "incongruent" },
            { text: "青", color: "red", condition: "incongruent" },
            { text: "青", color: "green", condition: "incongruent" },
            { text: "緑", color: "red", condition: "incongruent" },
            { text: "緑", color: "blue", condition: "incongruent" },
            { text: "赤", color: "red", condition: "congruent" }
        ];

        // 合計90試行にするため、9回繰り返す（10種類 * 9 = 90）
        const shuffledStimuli = jsPsych.randomization.repeat(stimuli, 9);

        shuffledStimuli.forEach(item => {
            // 注視点
            timeline.push({
                type: jsPsychHtmlKeyboardResponse,
                stimulus: '<div class="stimulus-text">+</div>',
                choices: "NO_KEYS",
                trial_duration: 500
            });

            // 刺激提示
            timeline.push({
                type: jsPsychHtmlKeyboardResponse,
                stimulus: `<div class="stimulus-text" style="color: ${item.color}">${item.text}</div>`,
                choices: ['r', 'b', 'g', 'R', 'B', 'G'],
                data: {
                    condition: item.condition,
                    correct_color: item.color,
                    target_text: item.text,
                    correct_response: item.color === 'red' ? 'r' : (item.color === 'blue' ? 'b' : 'g')
                },
                on_finish: function(data) {
                    const response = data.response ? data.response.toLowerCase() : null;
                    data.correct = (response === data.correct_response);
                }
            });

            // ITI
            timeline.push({
                type: jsPsychHtmlKeyboardResponse,
                stimulus: '',
                choices: "NO_KEYS",
                trial_duration: 1000
            });
        });

        jsPsych.run(timeline);
    </script>
</body>
</html>
