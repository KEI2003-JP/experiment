<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ストループ課題</title>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />

    <style>
        body { background-color: #FFFFFF; font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; }
        .stimulus { font-size: 60px; font-weight: bold; }
        .instruction { font-size: 24px; color: black; }
        .color-r { color: red; font-weight: bold; }
        .color-b { color: blue; font-weight: bold; }
        .color-g { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <script>
        const jsPsych = initJsPsych({
            on_finish: function() { jsPsych.data.displayData('csv'); }
        });

        const timeline = [];

        // 全画面プラグインによる権限エラーを避けるため、手動指示に変更
        timeline.push({
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '<div class="instruction">実験を開始します。<br>必要に応じてブラウザの全画面表示機能（F11キー等）をご利用ください。<br><br>スペースキーを押して進んでください。</div>',
            choices: [' ']
        });

        // (2) 教示画面
        timeline.push({
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <div class="instruction">
                    文字の『色』をキーボードで答えてください。<br><br>
                    <span class="color-r">赤</span>なら 'R'<br>
                    <span class="color-b">青</span>なら 'B'<br>
                    <span class="color-g">緑</span>なら 'G'<br><br>
                    スペースキーで開始します。
                </div>
            `,
            choices: [' ']
        });

        const words = ["赤", "青", "緑"];
        const colors = ["red", "blue", "green"];
        
        for (let i = 0; i < 90; i++) {
            const word = words[Math.floor(Math.random() * words.length)];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            // 注視点
            timeline.push({
                type: jsPsychHtmlKeyboardResponse,
                stimulus: '<div class="stimulus">+</div>',
                choices: "NO_KEYS",
                trial_duration: 500
            });

            // 刺激提示
            timeline.push({
                type: jsPsychHtmlKeyboardResponse,
                stimulus: `<div class="stimulus" style="color: ${color}">${word}</div>`,
                choices: ['r', 'b', 'g', 'R', 'B', 'G'], 
                data: {
                    condition: (word === "赤" && color === "red") || (word === "青" && color === "blue") || (word === "緑" && color === "green") ? 'congruent' : 'incongruent',
                    correct_response: color === 'red' ? 'r' : (color === 'blue' ? 'b' : 'g')
                },
                on_finish: function(data) {
                    const response = data.response ? data.response.toLowerCase() : null;
                    data.correct = jsPsych.pluginAPI.compareKeys(response, data.correct_response);
                }
            });

            // ITI
            timeline.push({
                type: jsPsychHtmlKeyboardResponse,
                stimulus: '',
                choices: "NO_KEYS",
                trial_duration: 1000
            });
        }

        jsPsych.run(timeline);
    </script>
</body>
</html>
